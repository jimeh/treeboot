name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ["*"]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  MISE_EXPERIMENTAL: true
  MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup

jobs:
  actions-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run actions:lint

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run format:check

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run generate:check

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run lint

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run msrv

  test:
    name: test (${{ matrix.os }}, ${{ matrix.task }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      MISE_RUSTUP_HOME: ${{ github.workspace }}/.mise-rustup
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            task: test:core
          - os: ubuntu-latest
            task: test:cli
          - os: ubuntu-latest
            task: test:release-helper
          - os: macos-26
            task: test:core
          - os: macos-26
            task: test:cli
          - os: macos-26
            task: test:release-helper
          - os: windows-2025
            task: test:core
          - os: windows-2025
            task: test:cli
          - os: windows-2025
            task: test:release-helper
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run ${{ matrix.task }}
