name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  MISE_EXPERIMENTAL: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      safe_version: ${{ steps.version.outputs.safe_version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          cache_key: mise-v2-${{ github.event_name }}-release-prepare-{{platform}}-{{file_hash}}

      - id: version
        run: scripts/release-version.sh

  build:
    needs: prepare
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            tool: cross
            smoke: cross
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            tool: cross
            smoke: cross
          - target: x86_64-linux-android
            runner: ubuntu-latest
            tool: cargo
            smoke: none
            android: true
            android_linker: x86_64-linux-android35-clang
          - target: aarch64-linux-android
            runner: ubuntu-latest
            tool: cargo
            smoke: none
            android: true
            android_linker: aarch64-linux-android35-clang
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            tool: cargo
            smoke: native
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            tool: cargo
            smoke: native
          - target: x86_64-apple-darwin
            runner: macos-26-intel
            tool: cargo
            smoke: native
          - target: aarch64-apple-darwin
            runner: macos-26
            tool: cargo
            smoke: native
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          cache_key: mise-v2-${{ github.event_name }}-${{ matrix.target }}-{{platform}}-{{file_hash}}

      - if: matrix.tool == 'cross'
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: cross

      - if: matrix.tool == 'cargo'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "${TARGET}"

      - if: matrix.android == true
        name: Configure Android linker
        shell: bash
        env:
          LINKER: ${{ matrix.android_linker }}
          TARGET: ${{ matrix.target }}
        run: |
          ndk="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_ROOT}}"
          ndk_bin="${ndk}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          linker_path="${ndk_bin}/${LINKER}"
          if [[ ! -x "${linker_path}" ]]; then
            echo "::error::Android linker not found: ${linker_path}"
            exit 1
          fi

          env_name="CARGO_TARGET_${TARGET^^}_LINKER"
          env_name="${env_name//-/_}"
          echo "${env_name}=${linker_path}" >>"${GITHUB_ENV}"

      - shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TOOL: ${{ matrix.tool }}
        run: |
          if [[ "${TOOL}" == "cross" ]]; then
            cross build -p treeboot --locked --release --target "${TARGET}"
          else
            cargo build -p treeboot --locked --release --target "${TARGET}"
          fi

      - if: matrix.smoke == 'cross'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cross run -p treeboot --locked --release --target "${TARGET}" -- --version

      - if: matrix.smoke == 'native'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          exe=""
          if [[ "${TARGET}" == *windows* ]]; then
            exe=".exe"
          fi
          "target/${TARGET}/release/treeboot${exe}" --version

      - shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/package-release-asset.sh "${TARGET}" "${VERSION}" dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  assemble:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          cache_key: mise-v2-${{ github.event_name }}-release-assemble-{{platform}}-{{file_hash}}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Package config schema
        run: scripts/package-config-schema.sh dist

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/treeboot-sbom.spdx.json
          upload-artifact: false

      - name: Generate checksums
        run: |
          (
            cd dist
            shasum -a 256 config.schema.json treeboot-* > treeboot-checksums.txt
          )

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: treeboot-release-${{ needs.prepare.outputs.safe_version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: needs.prepare.outputs.is_tag == 'true'
    needs: [prepare, assemble]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          cache_key: mise-v2-${{ github.event_name }}-release-publish-{{platform}}-{{file_hash}}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: treeboot-release-${{ needs.prepare.outputs.safe_version }}
          path: dist

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/config.schema.json
            dist/treeboot-*

      - name: Resolve release notes
        id: notes
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" --json isDraft >/tmp/treeboot-release.json 2>/dev/null; then
            echo "existing_release=true" >>"${GITHUB_OUTPUT}"
          else
            echo "existing_release=false" >>"${GITHUB_OUTPUT}"
            scripts/extract-release-notes.sh "${VERSION}" /tmp/treeboot-release-notes.md
          fi

      - if: steps.notes.outputs.existing_release == 'false'
        name: Create draft release
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" \
            --draft \
            --verify-tag \
            --title "${TAG}" \
            --notes-file /tmp/treeboot-release-notes.md

      - name: Upload release assets
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" dist/* --clobber

      - name: Authenticate to crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crates.io packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
          USER_AGENT: treeboot-release/${{ needs.prepare.outputs.version }} (https://github.com/jimeh/treeboot)
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          crate_version_exists() {
            local crate="$1"
            local version="$2"
            local status

            if ! status="$(
              curl \
                --silent \
                --show-error \
                --connect-timeout 10 \
                --max-time 30 \
                --retry 3 \
                --retry-connrefused \
                --retry-delay 2 \
                --output /dev/null \
                --user-agent "${USER_AGENT}" \
                --write-out "%{http_code}" \
                "https://crates.io/api/v1/crates/${crate}/${version}"
            )"; then
              echo "::error::failed to query crates.io for ${crate} ${version}"
              exit 1
            fi

            case "${status}" in
              200)
                return 0
                ;;
              404)
                return 1
                ;;
              *)
                echo "::error::unexpected crates.io status ${status} for ${crate} ${version}"
                exit 1
                ;;
            esac
          }

          wait_for_crate_version() {
            local crate="$1"
            local version="$2"

            for _ in {1..30}; do
              if crate_version_exists "${crate}" "${version}"; then
                return 0
              fi
              sleep 10
            done

            echo "::error::${crate} ${version} did not appear in crates.io in time"
            return 1
          }

          publish_crate() {
            local package="$1"
            local crate="$2"
            local version="$3"

            if crate_version_exists "${crate}" "${version}"; then
              echo "${crate} ${version} is already published; skipping"
              return 0
            fi

            cargo publish -p "${package}" --locked
          }

          publish_crate treeboot-core treeboot-core "${VERSION}"
          wait_for_crate_version treeboot-core "${VERSION}"
          publish_crate treeboot treeboot "${VERSION}"
          wait_for_crate_version treeboot "${VERSION}"

      - name: Publish release
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${TAG}" --draft=false --verify-tag
