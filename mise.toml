# ------------------------------------------------------------------------------
# Settings
# ------------------------------------------------------------------------------

[settings]
lockfile = true
lockfile_platforms = [
    "linux-x64",
    "linux-arm64",
    "macos-x64",
    "macos-arm64",
    "windows-x64",
    "windows-arm64",
]
minimum_release_age = "7d"
minimum_release_age_excludes = ["github:jimeh/treeboot"]
idiomatic_version_file_enable_tools = ["rust"]

[settings.task]
run_auto_install = true

# ------------------------------------------------------------------------------
# Tools
# ------------------------------------------------------------------------------

[tools]
actionlint = "1"
lefthook = "2"
markdownlint-cli2 = "0"
oxfmt = "0.56.0"
pinact = "4"
sccache = "0"
"github:jimeh/treeboot" = "latest"
shellcheck = "0"
zizmor = "1"

# ------------------------------------------------------------------------------
# Environment
# ------------------------------------------------------------------------------

[env]
RUSTC_WRAPPER = "sccache"

# ------------------------------------------------------------------------------
# Tasks
# ------------------------------------------------------------------------------

# Bootstrap

[tasks.setup]
description = "Set up local development environment"
depends = ["deps", "hooks:install"]

[tasks.deps]
description = "Fetch Rust dependencies"
run = "cargo fetch --locked"

[tasks."hooks:install"]
description = "Install lefthook Git hooks"
run = "lefthook install"

[tasks.treeboot]
description = "Bootstrap the current worktree with treeboot"
run = "treeboot"

# Development

[tasks.format]
depends = ["format:rust", "format:markdown"]
description = "Format Rust and Markdown files"

[tasks."format:rust"]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks."format:check"]
depends = ["format:rust:check", "format:markdown:check"]
description = "Check formatting without writing changes"

[tasks."format:rust:check"]
description = "Check Rust formatting without writing changes"
run = "cargo fmt --all -- --check"

[tasks."format:markdown"]
description = "Format Markdown files"
run = "oxfmt \"**/*.md\""

[tasks."format:markdown:check"]
description = "Check Markdown formatting without writing changes"
run = "oxfmt --check \"**/*.md\""

[tasks.lint]
depends = ["lint:rust", "lint:markdown"]
description = "Run Rust and Markdown lints"

[tasks."lint:rust"]
description = "Run Rust lints"
run = "cargo clippy --all-targets --all-features --locked -- -D warnings"

[tasks."lint:fix"]
description = "Apply machine-applicable Clippy suggestions"
run = "cargo clippy --fix --workspace --all-features --locked"

[tasks."lint:markdown"]
description = "Lint Markdown files"
run = "markdownlint-cli2 \"**/*.md\""

[tasks."lint:markdown:files"]
description = "Lint selected Markdown files"
usage = 'arg "<files>" var=#true'
run = '''
#!/usr/bin/env bash
set -euo pipefail

eval "files=(${usage_files?})"
oxfmt --check "${files[@]}"
markdownlint-cli2 "${files[@]}"
'''

# Builds

[tasks.build]
description = "Build all Rust targets"
run = "cargo build --workspace --all-targets --locked"

[tasks."build:release"]
description = "Build optimized release binaries"
run = "cargo build --workspace --release --locked"

[tasks."build:release:target"]
description = "Build an optimized treeboot binary for a target triple"
run = '''
target="${1:?target triple required}"
cargo build -p treeboot --locked --release --target "$target"
'''

# Generated artifacts

[tasks.generate]
description = "Generate checked-in artifacts"
run = ["mise run generate:schema", "mise run generate:metadata"]

[tasks."generate:schema"]
description = "Generate JSON Schema for treeboot config"
run = '''
cargo run -p treeboot-core --example generate_config_schema --locked -- schemas/treeboot.schema.json
mkdir -p crates/treeboot-core/assets
cp schemas/treeboot.schema.json crates/treeboot-core/assets/config.schema.json
'''

[tasks."generate:metadata"]
description = "Generate treeboot-core metadata assets"
run = "bash scripts/generate-metadata.sh"

[tasks."generate:check"]
depends = ["generate:schema:check", "generate:metadata:check"]
description = "Fail when generated artifacts are out of date"

[tasks."generate:schema:check"]
description = "Fail when generated JSON Schema is out of date"
run = '''
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT
cargo run -p treeboot-core --example generate_config_schema --locked -- "$tmp"
diff -u schemas/treeboot.schema.json "$tmp"
diff -u schemas/treeboot.schema.json crates/treeboot-core/assets/config.schema.json
'''

[tasks."generate:metadata:check"]
description = "Fail when generated metadata is out of date"
run = "bash scripts/generate-metadata.sh check"

# Tests

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --all-targets --all-features --locked"

[tasks."test:core"]
description = "Run treeboot-core tests"
run = "cargo test -p treeboot-core --all-targets --all-features --locked"

[tasks."test:cli"]
description = "Run treeboot CLI tests"
run = "cargo test -p treeboot --all-targets --all-features --locked"

[tasks."test:release-helper"]
description = "Run release helper tests"
run = "cargo test -p treeboot-release-helper --all-targets --all-features --locked"

# Coverage

[tasks.coverage]
description = "Run tests and print Rust coverage summary"
tools."cargo:cargo-llvm-cov" = "0.8.7"
run = "cargo llvm-cov --workspace --all-targets --all-features --locked"

[tasks."coverage:missing"]
description = "Show uncovered Rust lines"
tools."cargo:cargo-llvm-cov" = "0.8.7"
run = "cargo llvm-cov --workspace --all-targets --all-features --locked --summary-only --show-missing-lines"

# Validation

[tasks.check]
depends = ["format:check", "generate:check", "harness:check", "lint", "test"]
description = "Run normal pre-handoff checks"

[tasks.verify]
description = "Run broad local verification"
run = ["mise run ci", "mise run coverage"]

[tasks.ci]
depends = [
    "actions:lint",
    "format:check",
    "generate:check",
    "harness:check",
    "lint",
    "msrv",
    "test",
]
description = "Run all CI checks"

[tasks.msrv]
description = "Check Rust MSRV compatibility"
run = "mise exec rust@1.96.0 -- cargo check --locked"

[tasks."harness:check"]
description = "Check repo harness invariants"
run = "scripts/check-harness.sh"

[tasks.doctor]
description = "Check required local tools"
tools."cargo:cargo-llvm-cov" = "0.8.7"
run = [
    "git --version",
    "cargo --version",
    "cargo llvm-cov --version",
    "mise --version",
    "lefthook version",
]

# GitHub Actions

[tasks."actions:lint:actionlint"]
description = "Lint GitHub Actions workflow syntax"
run = "actionlint -shellcheck shellcheck"

[tasks."actions:lint:pinact"]
description = "Verify GitHub Actions are pinned"
run = "pinact run '-fix=false' -no-api"

[tasks."actions:lint:zizmor"]
description = "Audit GitHub Actions workflow security"
run = "zizmor --offline .github/workflows"

[tasks."actions:lint"]
depends = [
    "actions:lint:actionlint",
    "actions:lint:pinact",
    "actions:lint:zizmor",
]
description = "Run GitHub Actions linters"

# Release packaging

[tasks."release:version"]
description = "Print the release version derived from git describe"
run = "scripts/release-version.sh"

[tasks."release:package:local"]
description = "Build and package the current host release binary into dist/"
run = '''
target="$(rustc -vV | sed -n 's/^host: //p')"
version="$(scripts/release-version.sh)"
cargo build -p treeboot --locked --release --target "$target"
scripts/package-release-asset.sh "$target" "$version" dist
scripts/package-config-schema.sh dist
'''

[tasks."release:check"]
description = "Run local release packaging and completion smoke checks"
run = '''
mise run release:package:local
for shell in bash zsh fish powershell elvish; do
  cargo run -p treeboot --locked -- completions "$shell" >/dev/null
done
'''

# Cleanup

[tasks.clean]
description = "Remove Rust build output"
run = "cargo clean"
