name: renovate-mise

on:
  workflow_dispatch:
    inputs:
      bypass-schedule:
        description: >-
          Run Renovate immediately instead of waiting for the monthly window
        type: boolean
        default: true
  schedule:
    - cron: "17 1,3,5 1 * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate-mise:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        env:
          RENOVATE_BYPASS_SCHEDULE: ${{ inputs['bypass-schedule'] == true }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          configurationFile: .github/renovate-mise.config.js
          token: ${{ steps.app-token.outputs.token }}
