name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ["*"]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  MISE_EXPERIMENTAL: true
  MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup

jobs:
  actions-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run actions:lint

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run format:check

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run generate:check

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run lint

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run msrv

  test:
    name: test (${{ matrix.task }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        task:
          - test:core
          - test:cli
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run ${{ matrix.task }}
