name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to use for manual artifacts, without the v prefix"
        required: false
        type: string
      publish_release:
        description: "Publish a GitHub Release for the selected version"
        required: false
        default: false
        type: boolean
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  MISE_EXPERIMENTAL: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      safe_version: ${{ steps.version.outputs.safe_version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
      publish_release: ${{ steps.publish.outputs.publish_release }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-release-prepare-{{platform}}-{{file_hash}}

      - id: version
        env:
          TREEBOOT_RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/release-version.sh

      - id: publish
        env:
          IS_TAG: ${{ steps.version.outputs.is_tag }}
          REQUESTED_PUBLISH: ${{ inputs.publish_release }}
        run: |
          publish_release="false"
          if [[ "${IS_TAG}" == "true" || "${REQUESTED_PUBLISH}" == "true" ]]; then
            publish_release="true"
          fi
          echo "publish_release=${publish_release}" >>"${GITHUB_OUTPUT}"

  build:
    needs: prepare
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            tool: cross
            smoke: cross
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            tool: cross
            smoke: cross
          - target: x86_64-linux-android
            runner: ubuntu-latest
            tool: cross
            smoke: cross
          - target: aarch64-linux-android
            runner: ubuntu-latest
            tool: cross
            smoke: cross
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            tool: cargo
            smoke: native
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            tool: cargo
            smoke: native
          - target: x86_64-apple-darwin
            runner: macos-26-intel
            tool: cargo
            smoke: native
          - target: aarch64-apple-darwin
            runner: macos-26
            tool: cargo
            smoke: native
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-${{ matrix.target }}-{{platform}}-{{file_hash}}

      - if: matrix.tool == 'cross'
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cross

      - if: matrix.tool == 'cargo'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "${TARGET}"

      - shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TOOL: ${{ matrix.tool }}
        run: |
          if [[ "${TOOL}" == "cross" ]]; then
            cross build -p treeboot --locked --release --target "${TARGET}"
          else
            cargo build -p treeboot --locked --release --target "${TARGET}"
          fi

      - if: matrix.smoke == 'cross'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cross run -p treeboot --locked --release --target "${TARGET}" -- --version

      - if: matrix.smoke == 'native'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          exe=""
          if [[ "${TARGET}" == *windows* ]]; then
            exe=".exe"
          fi
          "target/${TARGET}/release/treeboot${exe}" --version

      - shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/package-release-asset.sh "${TARGET}" "${VERSION}" dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-release-publish-{{platform}}-{{file_hash}}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/treeboot-sbom.spdx.json
          upload-artifact: false

      - name: Generate checksums
        run: |
          (
            cd dist
            shasum -a 256 treeboot-* > treeboot-checksums.txt
          )

      - if: needs.prepare.outputs.publish_release == 'true'
        name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/treeboot-*

      - if: needs.prepare.outputs.publish_release != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: treeboot-release-${{ needs.prepare.outputs.safe_version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - if: needs.prepare.outputs.publish_release == 'true'
        name: Resolve release notes
        id: notes
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" --json isDraft >/tmp/treeboot-release.json 2>/dev/null; then
            echo "existing_release=true" >>"${GITHUB_OUTPUT}"
          else
            echo "existing_release=false" >>"${GITHUB_OUTPUT}"
            scripts/extract-release-notes.sh "${VERSION}" /tmp/treeboot-release-notes.md
          fi

      - if: needs.prepare.outputs.publish_release == 'true' && steps.notes.outputs.existing_release == 'false'
        name: Create draft release
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" \
            --draft \
            --verify-tag \
            --title "${TAG}" \
            --notes-file /tmp/treeboot-release-notes.md

      - if: needs.prepare.outputs.publish_release == 'true'
        name: Upload release assets
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" dist/* --clobber

      - if: needs.prepare.outputs.publish_release == 'true'
        name: Publish release
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${TAG}" --draft=false --verify-tag
