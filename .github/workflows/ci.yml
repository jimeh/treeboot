name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ["*"]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  MISE_EXPERIMENTAL: true
  MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup

jobs:
  actions-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run actions:lint

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run format:check

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run generate:check

  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run harness:check
        env:
          TREEBOOT_SPEC_BASE_REF: ${{ github.event.pull_request.base.sha }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run lint

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run msrv

  test:
    name: test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      MISE_RUSTUP_HOME: ${{ github.workspace }}/.mise-rustup
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
          - windows-2025
          - windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache_key: mise-v2-${{ github.event_name }}-{{platform}}-{{file_hash}}
      - run: mise run test
